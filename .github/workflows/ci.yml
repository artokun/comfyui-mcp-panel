name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  panel:
    runs-on: ubuntu-latest
    name: Lint pack (JS syntax + Python + pyproject)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # web/js is served LIVE via the custom_nodes junction — a single broken
      # save throws in ComfyUI's extension loader and takes down the WHOLE
      # frontend (no sidebar). node --check is the cheapest guard against that.
      - name: JS syntax check (web/js)
        shell: bash
        run: |
          set -e
          shopt -s globstar nullglob
          found=0
          for f in web/js/**/*.js; do
            found=1
            echo "node --check $f"
            node --check "$f"
          done
          [ "$found" = "1" ] || { echo "::error::no web/js/*.js files found"; exit 1; }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # __init__.py must compile and (by design) only register read-only routes
      # at import time. py_compile catches syntax breakage.
      - name: Python compile check (__init__.py)
        run: python -m py_compile __init__.py

      - name: Install bandit
        run: pip install bandit

      # Comfy Registry security-scan parity. The Registry flags custom nodes that
      # spawn processes / install-and-run packages at runtime, or use
      # eval/exec/os.system/pickle — see https://docs.comfy.org/registry/standards.
      # The Registry's own scanner is private, but Comfy-Org's public stand-in
      # (christian-byrne/custom-nodes-security-scan) runs Bandit with these exact
      # excludes (B101 assert / B112 try-except-continue / B311 random). Running
      # the SAME config here fails a would-be-flagged release in CI FIRST, instead
      # of publishing a version that never promotes to "latest" on the Registry.
      # (`import subprocess` = B404; subprocess calls = B602/B603 — exactly what
      # flagged every 0.x release before this pack went pure-frontend.)
      # No `-ll`: the stand-in reports ALL severities (only B101/B112/B311 excluded),
      # so LOW-severity smells like B110 (try/except/pass) are caught here too.
      - name: Security scan (Comfy Registry parity — Bandit)
        run: bandit -r . -s B101,B112,B311

      # Comfy Registry security-scan parity — YARA. The scanner also runs YARA
      # rules over ALL files (JS included). The one that bit us for every release
      # 0.1.0→0.6.1 was `SUSP_SVG_Onload_Onerror_Jul23`, which fires on the mere
      # co-occurrence in a file of "svg" AND ("onload" | "onerror") — nocase, no
      # proximity. It's a false positive on DOMPurify (a sanitizer contains those
      # XSS tokens by design) and on our own image handlers. Guard against a
      # regression: no shipped web/js file may contain svg + onload/onerror.
      # Fix pattern: addEventListener("load"|"error") instead of .onload/.onerror,
      # and keep the literal "onload"/"onerror" tokens out of comments.
      - name: Security scan (Comfy Registry parity — YARA SUSP_SVG)
        shell: bash
        run: |
          set -e
          shopt -s globstar nullglob
          fail=0
          for f in web/js/**/*.js; do
            if grep -qi 'svg' "$f" && grep -qiE 'onload|onerror' "$f"; then
              echo "::error file=$f::matches YARA SUSP_SVG_Onload_Onerror (svg + onload/onerror in one file) — the registry will flag this. Use addEventListener('load'/'error') and drop literal onload/onerror tokens."
              fail=1
            fi
          done
          [ "$fail" = "0" ] || exit 1

      - name: pyproject.toml is valid + has registry fields
        run: |
          python - <<'PY'
          import tomllib
          d = tomllib.load(open("pyproject.toml", "rb"))
          proj = d.get("project", {})
          comfy = d.get("tool", {}).get("comfy", {})
          missing = [k for k in ("name", "version", "description", "license") if not proj.get(k)]
          if not comfy.get("PublisherId"):
              missing.append("tool.comfy.PublisherId")
          assert not missing, f"pyproject missing required fields: {missing}"
          print(f"pyproject OK: {proj['name']} {proj['version']}")
          PY
