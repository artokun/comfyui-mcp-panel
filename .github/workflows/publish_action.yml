name: Publish to Comfy Registry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Gate: never publish a broken pack to the Registry. -------------
      # web/js is served live and a broken save crashes the whole ComfyUI
      # frontend; these checks mirror ci.yml and run BEFORE publish. A failed
      # step aborts the job, so the publish step below only runs if all pass.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: JS syntax check (web/js)
        shell: bash
        run: |
          set -e
          shopt -s globstar nullglob
          found=0
          for f in web/js/**/*.js; do
            found=1
            echo "node --check $f"
            node --check "$f"
          done
          [ "$found" = "1" ] || { echo "::error::no web/js/*.js files found"; exit 1; }

      # Never publish a version the registry's YARA scan will flag. The rule
      # SUSP_SVG_Onload_Onerror fires on "svg" + ("onload"|"onerror") co-occurring
      # in any file (nocase). Flagged every release 0.1.0→0.6.1. Fix: use
      # addEventListener("load"/"error") and keep onload/onerror tokens out of code+comments.
      - name: Registry YARA parity (SUSP_SVG) — block a would-be-flagged publish
        shell: bash
        run: |
          set -e
          shopt -s globstar nullglob
          fail=0
          for f in web/js/**/*.js; do
            if grep -qi 'svg' "$f" && grep -qiE 'onload|onerror' "$f"; then
              echo "::error file=$f::svg + onload/onerror co-occur — registry will flag. Aborting publish."
              fail=1
            fi
          done
          [ "$fail" = "0" ] || exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python compile check (__init__.py)
        run: python -m py_compile __init__.py

      - name: pyproject.toml is valid + has registry fields
        run: |
          python - <<'PY'
          import tomllib
          d = tomllib.load(open("pyproject.toml", "rb"))
          proj = d.get("project", {})
          comfy = d.get("tool", {}).get("comfy", {})
          missing = [k for k in ("name", "version", "description", "license") if not proj.get(k)]
          if not comfy.get("PublisherId"):
              missing.append("tool.comfy.PublisherId")
          assert not missing, f"pyproject missing required fields: {missing}"
          print(f"publishing {proj['name']} {proj['version']}")
          PY
      # --------------------------------------------------------------------

      - name: Publish custom node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
